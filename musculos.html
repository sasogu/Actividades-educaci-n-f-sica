<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Coloca los músculos</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
</head>
<body class="page-musculos">
  <div class="contenedor">
    <h1>Arrastra cada músculo a su sitio</h1>
    <p class="intro">Mueve los nombres a la zona correcta del cuerpo humano.</p>

    <div class="panel">
      <div class="lista" id="listaMusculos">
        <div class="musculo" draggable="true" data-musculo="Pectorales">Pectorales</div>
        <div class="musculo" draggable="true" data-musculo="Bíceps">Bíceps</div>
        <div class="musculo" draggable="true" data-musculo="Abdominales">Abdominales</div>
        <div class="musculo" draggable="true" data-musculo="Cuádriceps">Cuádriceps</div>
        <div class="musculo" draggable="true" data-musculo="Gemelos">Gemelos</div>
        <div class="musculo" draggable="true" data-musculo="Esternocleidomastoideo">Esternocleidomastoideo</div>
        <div class="musculo" draggable="true" data-musculo="Deltoides">Deltoides</div>
        <div class="musculo" draggable="true" data-musculo="Trapecio">Trapecio</div>
      </div>

      <div class="imagen-container" id="imagenContainer">
        <img src="images/musculos-cuerpo.svg" alt="Esquema de músculos del cuerpo humano">

        <div class="zona" data-musculo="Trapecio" style="left: 22%; top: 29%;"></div>
        <div class="zona" data-musculo="Deltoides" style="left: 22%; top: 40%;"></div>
        <div class="zona" data-musculo="Bíceps" style="left: 22%; top: 48.5%;"></div>
        <div class="zona" data-musculo="Gemelos" style="left: 24%; top: 77.5%;"></div>
        <div class="zona" data-musculo="Esternocleidomastoideo" style="left: 82%; top: 33%;"></div>
        <div class="zona" data-musculo="Pectorales" style="left: 83.5%; top: 41.0%;"></div>
        <div class="zona" data-musculo="Abdominales" style="left: 82%; top: 49.0%;"></div>
        <div class="zona" data-musculo="Cuádriceps" style="left: 82%; top: 66.5%;"></div>
      </div>
    </div>

    <div id="feedback" class="feedback">Arrastra un músculo y suéltalo en su lugar.</div>
    <button class="boton-reset" id="resetBtn" type="button">Volver a empezar</button>
  </div>

  <script src="app.js"></script>
</body>
</html>
