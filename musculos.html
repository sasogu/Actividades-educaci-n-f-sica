<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Coloca los músculos</title>
  <style>
    html, body {
      font-family: sans-serif;
    }

    body {
      background: linear-gradient(135deg, #eef7ff, #fff3d6);
      color: #2f3e46;
      margin: 0;
      padding: 24px;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .contenedor {
      background: white;
      border-radius: 20px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.15);
      width: min(94vw, 900px);
      padding: 24px;
    }

    h1 {
      text-align: center;
      color: #1d4ed8;
      margin-top: 0;
    }

    .intro {
      text-align: center;
      margin-bottom: 16px;
      font-size: 1.05rem;
    }

    .panel {
      display: grid;
      grid-template-columns: 220px 1fr;
      gap: 20px;
      align-items: start;
    }

    .lista {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .musculo {
      padding: 10px 12px;
      border: 2px solid #2563eb;
      border-radius: 999px;
      background: #eff6ff;
      color: #1d4ed8;
      font-weight: bold;
      text-align: center;
      cursor: grab;
      user-select: none;
    }

    .musculo:active {
      cursor: grabbing;
    }

    .musculo.oculto {
      display: none;
    }

    .imagen-container {
      position: relative;
      border: 2px solid #dbeafe;
      border-radius: 16px;
      overflow: hidden;
      background: #f8fbff;
    }

    .imagen-container img {
      display: block;
      width: 100%;
      height: auto;
    }

    .zona {
      position: absolute;
      width: 110px;
      height: 40px;
      transform: translate(-50%, -50%);
      border: 2px dashed #60a5fa;
      border-radius: 999px;
      background: rgba(255,255,255,0.2);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.85rem;
      font-weight: bold;
      color: #1e3a8a;
      pointer-events: auto;
    }

    .zona.completada {
      border-style: solid;
      background: rgba(34,197,94,0.16);
      border-color: #22c55e;
    }

    .zona .nombre {
      pointer-events: none;
    }

    .feedback {
      margin-top: 14px;
      text-align: center;
      font-weight: bold;
      min-height: 24px;
      color: #2563eb;
    }

    .boton-reset {
      display: block;
      margin: 12px auto 0;
      border: none;
      border-radius: 999px;
      padding: 10px 16px;
      background: #2563eb;
      color: white;
      cursor: pointer;
      font-size: 1rem;
    }

    @media (max-width: 760px) {
      .panel {
        grid-template-columns: 1fr;
      }

      .lista {
        flex-direction: row;
        flex-wrap: wrap;
      }

      .musculo {
        flex: 1 1 calc(50% - 10px);
      }
    }
  </style>
</head>
<body>
  <div class="contenedor">
    <h1>Arrastra cada músculo a su sitio</h1>
    <p class="intro">Mueve los nombres a la zona correcta del cuerpo humano.</p>

        <div class="zona" data-musculo="Trapecio" style="left: 22%; top: 29%;"></div>
        <div class="zona" data-musculo="Deltoides" style="left: 22%; top: 40%;"></div>
        <div class="zona" data-musculo="Bíceps" style="left: 22%; top: 48.5%;"></div>
        <div class="zona" data-musculo="Gemelos" style="left: 24%; top: 77.5%;"></div>
        <div class="zona" data-musculo="Esternocleidomastoideo" style="left: 82%; top: 33%;"></div>
        <div class="zona" data-musculo="Pectorales" style="left: 83.5%; top: 41.0%;"></div>
        <div class="zona" data-musculo="Abdominales" style="left: 82%; top: 49.0%;"></div>
        <div class="zona" data-musculo="Cuádriceps" style="left: 82%; top: 66.5%;"></div>
      </div>
    </div>

    <div id="feedback" class="feedback">Arrastra un músculo y suéltalo en su lugar.</div>
    <button class="boton-reset" id="resetBtn" type="button">Volver a empezar</button>
  </div>

  <script>
    const lista = document.getElementById('listaMusculos');
    const feedback = document.getElementById('feedback');
    const resetBtn = document.getElementById('resetBtn');
    const zonas = Array.from(document.querySelectorAll('.zona'));
    let musculoSeleccionado = null;

    document.querySelectorAll('.musculo').forEach((musculo) => {
      musculo.addEventListener('dragstart', (e) => {
        musculoSeleccionado = musculo.dataset.musculo;
        e.dataTransfer.setData('text/plain', musculoSeleccionado);
      });
    });

    zonas.forEach((zona) => {
      zona.addEventListener('dragover', (e) => {
        e.preventDefault();
      });

      zona.addEventListener('drop', (e) => {
        e.preventDefault();
        const nombre = e.dataTransfer.getData('text/plain');
        if (nombre === zona.dataset.musculo) {
          const elemento = document.querySelector(`.musculo[data-musculo="${nombre}"]`);
          if (elemento) {
            elemento.classList.add('oculto');
            zona.classList.add('completada');
            zona.innerHTML = `<span class="nombre">${nombre}</span>`;
            feedback.textContent = `¡Correcto! ${nombre} va en su sitio.`;
          }
        } else {
          feedback.textContent = 'Prueba otra vez. Ese músculo no va ahí.';
        }
      });
    });

    resetBtn.addEventListener('click', () => {
      document.querySelectorAll('.musculo').forEach((musculo) => {
        musculo.classList.remove('oculto');
      });
      zonas.forEach((zona) => {
        zona.classList.remove('completada');
        zona.innerHTML = '';
      });
      feedback.textContent = 'Arrastra un músculo y suéltalo en su lugar.';
    });
  </script>
