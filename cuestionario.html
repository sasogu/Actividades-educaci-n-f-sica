<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cuestionario de músculos y huesos</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
</head>
<body class="page-cuestionario">
  <main class="contenedor">
    <h1>Cuestionario: músculos y huesos</h1>
    <p class="intro">Responde a estas 10 preguntas y descubre cuánto sabes sobre tu cuerpo.</p>
    <img id="imagenPregunta" class="imagen" src="images/esqueleto.jpg" alt="Imagen de referencia para la pregunta">

    <section id="quiz">
      <div id="pregunta" class="pregunta"></div>
      <div id="opciones" class="opciones"></div>
      <div id="feedback" class="feedback"></div>
      <div class="acciones">
        <button id="siguiente" type="button">Siguiente</button>
      </div>
    </section>

    <section id="resultado" class="resultado">
      <h2>¡Fin del cuestionario!</h2>
      <p id="mensajeResultado"></p>
      <button id="reiniciar" type="button">Volver a empezar</button>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
